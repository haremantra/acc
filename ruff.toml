# Lint/format config for the ACC helper scripts and their tests.
# Kept intentionally small: this repo ships a skill bundle, not a package.
target-version = "py310"
line-length = 100

# Only our Python lives in these two dirs; everything else is docs/assets.
include = ["scripts/**/*.py", "tests/**/*.py"]

[lint]
# pycodestyle (E/W), pyflakes (F), isort (I), pyupgrade (UP), flake8-bugbear (B).
select = ["E", "W", "F", "I", "UP", "B"]
